<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Dias mas bellacos de la historia</legend>
            <label for="bellakera">Bellakera</label>
            <input type="date" id="bellakera" name="bellakera" minlength="2000-00-00" required placeholder="2001-03-02">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="pon tu correo gonorrea" pattern="[A-Z][A-Za-z]{2-200}@[a-zA-Z]{5,}S.[a-zA-Z]{2,5}">
            <label for="enviar">Enviar</label>
            <input type="submit" value="Enviar" id="enviar" name="boton de enviar ">
        </fieldset>
    </form>
</body>
</html>
